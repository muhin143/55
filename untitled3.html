<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proposal Letter</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', sans-serif;
    }
    .envelope {
      position: relative;
      width: 320px;
      height: 200px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      cursor: pointer;
      overflow: hidden;
    }
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: rgba(255,255,255,0.25);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-family: 'Press Start 2P', cursive;
      color: #2e7d32;
      text-shadow: 2px 2px #000;
    }
    .message {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .message img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    .envelope.opened .message {
      opacity: 1;
    }
    .envelope.opened .flap {
      display: none;
    }
  </style>
</head>
<body>
  <div class="envelope" onclick="this.classList.toggle('opened')">
    <div class="flap">Open</div>
    <div class="message">
      <img src="https://drive.google.com/uc?export=view&id=11efvHOrWmxA4g1mIHIQdMaS-LN1iDUt7" alt="Proposal Image">
    </div>
  </div>
</body>
</html>
